<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" role="img" aria-labelledby="title desc">
  <title id="title">Ficonter monogram</title>
  <desc id="desc">A champagne gold architectural F monogram inside a circular frame on deep charcoal.</desc>
  <defs>
    <linearGradient id="gold" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#f2d99c"/>
      <stop offset="0.48" stop-color="#c9a45d"/>
      <stop offset="1" stop-color="#8c6429"/>
    </linearGradient>
    <radialGradient id="bg" cx="40%" cy="30%" r="85%">
      <stop offset="0" stop-color="#242b2e"/>
      <stop offset="1" stop-color="#111619"/>
    </radialGradient>
  </defs>
  <rect width="512" height="512" rx="112" fill="url(#bg)"/>
  <circle cx="256" cy="256" r="188" fill="none" stroke="url(#gold)" stroke-width="12"/>
  <g fill="url(#gold)">
    <rect x="180" y="145" width="22" height="226" rx="2"/>
    <rect x="180" y="145" width="156" height="22" rx="2"/>
    <rect x="180" y="232" width="126" height="22" rx="2"/>
    <rect x="222" y="180" width="22" height="191" rx="2" opacity=".96"/>
    <rect x="222" y="180" width="114" height="22" rx="2" opacity=".96"/>
    <rect x="222" y="270" width="94" height="22" rx="2" opacity=".96"/>
  </g>
</svg>
